        <h1>WTFIFU — Evidence-Based Dental Materials and Clinical Protocols</h1>
        <p>Where to Find Instructions for Use. Free clinical quick reference for dentists. 590+ products, 800+ citations, 19 specialties.</p>
        <h2>Specialties Covered</h2>
        <h3>Restorative Dentistry</h3>
        <p>CAD/CAM blocks (IPS e.max CAD, BruxZir, Katana Zirconia, Cercon 4D, VITA Enamic, Tetric CAD, Lava Ultimate, Grandio Blocs, Cerasmart, Tessera), composites (Filtek Supreme, Tetric PowerFill, Estelite, Harmonize), bonding agents (Scotchbond Universal Plus, Clearfil Universal Bond Quick, G-Premio Bond), cements (RelyX Unicem, Multilink Automix, Panavia V5, FujiCEM Evolve, BioCem), surface treatments, staining and polishing systems. Clinical outcomes: e.max 5-yr 98.5% single crowns; monolithic zirconia 5-yr 96.8%.</p>
        <h3>Prosthodontics</h3>
        <p>Zirconia with clinical outcomes, crown and bridge protocols, provisional materials (Protemp Plus, Luxatemp, Integrity), impression materials, tissue management, removable prosthetics, shade matching, full-arch design protocols.</p>
        <h3>Endodontics</h3>
        <p>77 products: rotary file systems (ProTaper Gold, ProTaper Next, WaveOne Gold, Vortex Blue, HyFlex EDM, HyFlex CM, TruNatomy, XP-endo Shaper, EdgeOne Fire), irrigants (NaOCl, EDTA, CHX protocols), bioceramics (EndoSequence BC Sealer, Biodentine, ProRoot MTA, NeoMTA Plus), obturation systems. Specs and Settings, Technique, and Evidence tabs with motor RPM, torque, file sequences, and clinical comparison data.</p>
        <h3>Periodontics</h3>
        <p>84 products: membranes (Bio-Gide, Cytoplast Ti-250, CopiOs, Dynamatrix), bone grafts (Bio-Oss, FDBA, DFDBA, Puros, Cerabone, SynthoGraft), biologics (Emdogain, GEM 21S, L-PRF), sutures (Vicryl, Monocryl, PTFE, Chromic Gut), hemostatics (Gelfoam, Surgicel, CollaPlug). Evidence-based composition, technique, and outcomes data.</p>
        <h3>Implantology</h3>
        <p>21 products: implant systems (Straumann BLT/BLX with SLA/SLActive, Nobel NobelActive with TiUnite, Astra OsseoSpeed EV with fluoride modification, Zimmer Biomet T3, Neodent Helix GM), abutments, overdenture attachments, guided surgery protocols, drilling protocols with ISQ/torque targets, implant surface treatment science.</p>
        <h3>Preventive Dentistry</h3>
        <p>Fluoride varnishes, silver diamine fluoride, sealants, remineralization agents (MI Paste, Clinpro 5000), xerostomia management, CAMBRA caries risk assessment protocols.</p>
        <h3>Sedation and Anesthesia</h3>
        <p>31 products: local anesthetics (lidocaine, articaine, mepivacaine, bupivacaine), topical anesthetics, N2O protocols, oral sedation (triazolam, diazepam, hydroxyzine), IV sedation, emergency drug dosing. Pharmacology, Dosing, and Evidence tabs.</p>
        <h3>Orofacial Pain and TMD</h3>
        <p>23 products: splint therapy, trigger point injections, Botox protocols, pharmacologic management, physical therapy modalities, acupuncture.</p>
        <h3>Sleep Dentistry</h3>
        <p>Mandibular advancement devices, screening tools (STOP-BANG, Epworth), titration protocols.</p>
        <h3>Laser Dentistry</h3>
        <p>19 products: diode (810nm, 940nm, 980nm), Er:YAG, Nd:YAG wavelengths. Physics, settings, evidence, and safety protocols.</p>
        <h3>3D Printing</h3>
        <p>28 individual products: printers (SprintRay Pro, Formlabs Form 3B+/4B, Asiga), surgical guide resins, provisional resins (NextDent C&B MFH, Formlabs Temp CB), permanent resins (Crowntec), denture base resins, splint resins (KeySplint), post-cure and washing protocols, FDA clearance status guide.</p>
        <h3>Orthodontics</h3>
        <p>Brackets, clear aligners, wires, elastics, TADs, retention protocols.</p>
        <h3>Pediatric Dentistry</h3>
        <p>Hall Technique, pediatric zirconia crowns, SDF protocols, vital pulp therapy, space maintainers, behavior management.</p>
        <h3>Dental Trauma</h3>
        <p>Emergency protocols for avulsion, luxation, crown fractures. Splinting, storage media, follow-up timelines.</p>
        <h3>Dental Photography</h3>
        <p>Camera systems, macro lenses, ring flash, retractors for clinical documentation.</p>
        <h3>Oral Medicine</h3>
        <p>Oral lichen planus, aphthous stomatitis, candidiasis, herpes simplex, burning mouth syndrome, xerostomia, mucous membrane pemphigoid, angular cheilitis. Diagnosis, management, and evidence tabs.</p>
